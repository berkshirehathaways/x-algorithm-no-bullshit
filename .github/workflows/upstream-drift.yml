name: upstream-drift

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compare evidence pin with upstream
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_upstream.py
      - name: Resolve pinned citation ranges
        run: python scripts/verify_sources.py
